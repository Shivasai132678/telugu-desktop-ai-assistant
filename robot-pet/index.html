<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Pet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Robot Character -->
    <div class="robot-container sleeping" id="robot">
        <div class="speech-bubble" id="speech-bubble">
            <span id="speech-text">Zzz...</span>
        </div>
        <div class="robot" id="robot-body">
            <!-- Antenna -->
            <div class="antenna">
                <div class="antenna-ball"></div>
                <div class="antenna-stick"></div>
            </div>
            <!-- Head -->
            <div class="head">
                <div class="visor">
                    <div class="eye left-eye">
                        <div class="pupil"></div>
                    </div>
                    <div class="eye right-eye">
                        <div class="pupil"></div>
                    </div>
                </div>
                <div class="mouth"></div>
                <div class="cheek left-cheek"></div>
                <div class="cheek right-cheek"></div>
            </div>
            <!-- Body -->
            <div class="body">
                <div class="chest-light"></div>
                <div class="chest-panel">
                    <div class="panel-line"></div>
                    <div class="panel-line"></div>
                    <div class="panel-line"></div>
                </div>
                <!-- Arms -->
                <div class="arm left-arm">
                    <div class="hand"></div>
                </div>
                <div class="arm right-arm">
                    <div class="hand"></div>
                </div>
            </div>
            <!-- Legs -->
            <div class="legs">
                <div class="leg left-leg">
                    <div class="foot"></div>
                </div>
                <div class="leg right-leg">
                    <div class="foot"></div>
                </div>
            </div>
            <!-- Shadow -->
            <div class="robot-shadow"></div>
        </div>
    </div>

    <script src="robot.js"></script>
</body>
</html>
